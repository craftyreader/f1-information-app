<!doctype html>
<html lang="en">
  <head>
    <meta name="description" content="Webpage description goes here" />
    <meta charset="utf-8" />
    <title>F1 Information App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="" />
    <link rel="stylesheet" href="style.css" />
    <!-- <script src="http://code.jquery.com/jquery-latest.min.js"></script> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <div id="topContainer">
      <button id="decreaseYearButton">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <p id="yearText"></p>
      <button id="increaseYearButton">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <button id="toggleLegendButton">
        <i class="fa-solid fa-info"></i>
      </button>
      <div style="width: 1rem"></div>
      <button id="zoomOutButton">
        <i class="fa-solid fa-minus"></i>
      </button>
      <i class="fa-solid fa-magnifying-glass"></i>
      <button id="zoomInButton">
        <i class="fa-solid fa-plus"></i>
      </button>
      <button id="resetZoomButton">
        <i class="fa-solid fa-rotate-left"></i>
      </button>
    </div>

    <div id="mainContainer">Please wait...</div>

    <div id="chartContainer">
      <canvas id="myChart"></canvas>
    </div>

    <div id="infoGrid">
      <div id="raceInfoBox">
        <h2 id="raceInfoHeader">Race Information</h2>
        <p id="raceInfoText"></p>
      </div>
      <div id="driverInfoBox">
        <h2 id="driverInfoHeader">Driver Information</h2>
        <p id="driverInfoText"></p>
      </div>
      <div id="driverResultsBox">
        <h2 id="driverResultsHeader">Driver Results</h2>
        <p id="driverResultsText"></p>
      </div>
    </div>
  </body>
</html>
